<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Mediator — Private Chat</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      background: #090912;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
      color: #d8daf0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Name entry screen ─────────────────────────────────────────────── */
    #join {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    #join-card {
      width: 100%;
      max-width: 380px;
      background: #12121e;
      border: 1px solid #2a2a44;
      border-radius: 14px;
      padding: 28px 26px;
    }

    #join-card h1 {
      font-size: 17px;
      margin-bottom: 4px;
    }

    #join-card .sub {
      font-size: 13px;
      color: #6a6a90;
      margin-bottom: 22px;
      line-height: 1.5;
    }

    #join-card label {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #5a5a80;
      margin-bottom: 8px;
    }

    #name-input {
      width: 100%;
      padding: 11px 14px;
      background: #090912;
      border: 1.5px solid #2a2a44;
      border-radius: 8px;
      color: #e4e6ff;
      font-size: 14px;
      font-family: inherit;
      outline: none;
    }

    #name-input:focus { border-color: #6060a0; }

    #join-btn {
      width: 100%;
      margin-top: 14px;
      padding: 11px;
      background: #2a2a50;
      border: 1.5px solid #4040a0;
      border-radius: 8px;
      color: #d8daf0;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    #join-btn:hover:not(:disabled) { background: #353580; border-color: #6060c0; }
    #join-btn:disabled { opacity: 0.5; cursor: wait; }

    .err { color: #cc6666; font-size: 12px; margin-top: 10px; display: none; }

    /* ── Chat screen ───────────────────────────────────────────────────── */
    #chat { display: none; flex: 1; flex-direction: column; }

    #chat-header {
      padding: 14px 20px;
      border-bottom: 1px solid #1a1a2a;
      background: #0d0d18;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #chat-header h1 {
      font-size: 14px;
      font-weight: 600;
      color: #c8caee;
    }

    #chat-header .who {
      font-size: 12px;
      color: #5a5a80;
      margin-left: auto;
    }

    #conn-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #2ecf82;
      box-shadow: 0 0 6px rgba(46,207,130,0.6);
    }
    #conn-dot.offline { background: #cc4444; box-shadow: 0 0 6px rgba(204,68,68,0.6); }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.45;
      word-wrap: break-word;
      animation: slideIn 0.25s ease-out;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.mine {
      align-self: flex-end;
      background: #2a2a50;
      border: 1px solid #3a3a70;
      color: #e4e6ff;
      border-bottom-right-radius: 4px;
    }

    .msg.mine.pending { opacity: 0.6; }

    .msg.them {
      align-self: flex-start;
      background: #12121e;
      border: 1px solid #2a2a44;
      color: #d8daf0;
      border-bottom-left-radius: 4px;
    }

    .msg-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #6666aa;
      margin-bottom: 4px;
    }

    .msg.them .msg-label { color: #5a7aa0; }

    .hint {
      align-self: center;
      color: #44445a;
      font-size: 12px;
      font-style: italic;
      padding: 8px 0;
    }

    .typing {
      align-self: flex-start;
      padding: 10px 14px;
      color: #5a5a80;
      font-size: 13px;
      font-style: italic;
    }

    .typing span {
      display: inline-block;
      animation: blink 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink { 0%, 60%, 100% { opacity: 0.3; } 30% { opacity: 1; } }

    #composer {
      border-top: 1px solid #1a1a2a;
      padding: 14px 20px;
      background: #0d0d18;
      display: flex;
      gap: 10px;
    }

    #msg-input {
      flex: 1;
      padding: 11px 14px;
      background: #090912;
      border: 1.5px solid #2a2a44;
      border-radius: 8px;
      color: #e4e6ff;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      resize: none;
      max-height: 120px;
    }

    #msg-input:focus { border-color: #6060a0; }

    #send-btn {
      padding: 0 18px;
      background: #2a2a50;
      border: 1.5px solid #4040a0;
      border-radius: 8px;
      color: #d8daf0;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    #send-btn:hover:not(:disabled) { background: #353580; border-color: #6060c0; }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>

  <!-- ── Name entry ─────────────────────────────────────────────────────── -->
  <div id="join">
    <div id="join-card">
      <h1>AI Mediator</h1>
      <p class="sub">Private chat channel. Messages you send here are visible only to the mediator, not to the rest of your group.</p>
      <label for="name-input">Your name</label>
      <input id="name-input" type="text" autocomplete="off" maxlength="40" placeholder="e.g. Priya">
      <button id="join-btn">Enter chat</button>
      <div class="err" id="join-err"></div>
    </div>
  </div>

  <!-- ── Chat ───────────────────────────────────────────────────────────── -->
  <div id="chat">
    <div id="chat-header">
      <span id="conn-dot"></span>
      <h1>AI Mediator</h1>
      <span class="who" id="who-label"></span>
    </div>

    <div id="messages">
      <div class="hint">You're connected. Anything you write here is private.</div>
    </div>

    <div id="composer">
      <textarea id="msg-input" rows="1" placeholder="Type a message…"></textarea>
      <button id="send-btn" disabled>Send</button>
    </div>
  </div>

  <script>
    // ─── State ──────────────────────────────────────────────────────────────
    let me = null;  // { id, name }
    let eventSource = null;
    let typingEl = null;

    const $ = (id) => document.getElementById(id);

    // ─── Join flow ──────────────────────────────────────────────────────────
    const nameInput = $('name-input');
    const joinBtn   = $('join-btn');
    const joinErr   = $('join-err');

    nameInput.focus();
    nameInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') joinBtn.click(); });

    joinBtn.addEventListener('click', async () => {
      const name = nameInput.value.trim();
      if (!name) { showErr('Please enter your name.'); return; }

      joinBtn.disabled = true;
      joinBtn.textContent = 'Connecting…';
      joinErr.style.display = 'none';

      try {
        const r = await fetch('/api/join', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name }),
        });
        if (!r.ok) throw new Error((await r.json()).error || 'Join failed');
        me = await r.json();
        sessionStorage.setItem('mediator_me', JSON.stringify(me));
        enterChat();
      } catch (err) {
        showErr(err.message || 'Could not connect.');
        joinBtn.disabled = false;
        joinBtn.textContent = 'Enter chat';
      }
    });

    function showErr(text) {
      joinErr.textContent = text;
      joinErr.style.display = 'block';
    }

    // ─── Try auto-rejoin if this tab refreshed ──────────────────────────────
    (function tryRejoin() {
      const saved = sessionStorage.getItem('mediator_me');
      if (!saved) return;
      try {
        me = JSON.parse(saved);
        // We don't verify server-side — if the server has forgotten us,
        // the SSE stream will just close and we'll show a reconnect path.
        enterChat();
      } catch (e) { sessionStorage.removeItem('mediator_me'); }
    })();

    // ─── Enter chat ─────────────────────────────────────────────────────────
    function enterChat() {
      $('join').style.display = 'none';
      $('chat').style.display = 'flex';
      $('who-label').textContent = me.name;
      $('msg-input').focus();
      connectSSE();
      wireComposer();
    }

    // ─── SSE ────────────────────────────────────────────────────────────────
    function connectSSE() {
      if (eventSource) eventSource.close();
      eventSource = new EventSource(`/api/events?role=participant&id=${encodeURIComponent(me.id)}`);

      eventSource.onopen = () => setConn(true);

      eventSource.onerror = () => {
        setConn(false);
        // EventSource auto-reconnects; if the server forgot us (restart), the
        // reconnects will keep failing. That's fine for a study prototype.
      };

      eventSource.onmessage = (e) => {
        let data; try { data = JSON.parse(e.data); } catch (err) { return; }

        if (data.type === 'mediator_message') {
          removeTyping();
          renderMessage({
            side: 'them',
            label: 'Mediator',
            text: data.message.text,
            time: data.message.timestamp,
          });
        }
      };
    }

    function setConn(on) {
      $('conn-dot').classList.toggle('offline', !on);
    }

    // ─── Composer ───────────────────────────────────────────────────────────
    function wireComposer() {
      const input = $('msg-input');
      const btn   = $('send-btn');

      const updateBtn = () => { btn.disabled = input.value.trim().length === 0; };
      input.addEventListener('input', () => {
        updateBtn();
        // auto-grow
        input.style.height = 'auto';
        input.style.height = Math.min(input.scrollHeight, 120) + 'px';
      });

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          if (!btn.disabled) send();
        }
      });

      btn.addEventListener('click', send);

      async function send() {
        const text = input.value.trim();
        if (!text) return;

        input.value = '';
        input.style.height = 'auto';
        updateBtn();
        input.focus();

        const pendingEl = renderMessage({
          side: 'mine',
          label: 'You',
          text,
          pending: true,
        });

        try {
          const r = await fetch('/api/send', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ participantId: me.id, text }),
          });
          if (!r.ok) throw new Error('send failed');
          pendingEl.classList.remove('pending');
          showTyping();
        } catch (err) {
          pendingEl.classList.remove('pending');
          pendingEl.style.opacity = '0.5';
          pendingEl.title = 'Failed to send';
        }
      }
    }

    // ─── Rendering ──────────────────────────────────────────────────────────
    function renderMessage({ side, label, text, pending, time }) {
      const wrap = document.createElement('div');
      wrap.className = 'msg ' + side + (pending ? ' pending' : '');
      const labelEl = document.createElement('div');
      labelEl.className = 'msg-label';
      labelEl.textContent = label;
      const textEl = document.createElement('div');
      textEl.textContent = text; // textContent → safe against XSS
      wrap.appendChild(labelEl);
      wrap.appendChild(textEl);
      $('messages').appendChild(wrap);
      $('messages').scrollTop = $('messages').scrollHeight;
      return wrap;
    }

    function showTyping() {
      removeTyping();
      typingEl = document.createElement('div');
      typingEl.className = 'typing';
      typingEl.innerHTML = 'Mediator is reviewing<span>.</span><span>.</span><span>.</span>';
      $('messages').appendChild(typingEl);
      $('messages').scrollTop = $('messages').scrollHeight;
    }

    function removeTyping() {
      if (typingEl && typingEl.parentNode) typingEl.parentNode.removeChild(typingEl);
      typingEl = null;
    }
  </script>

</body>
</html>
